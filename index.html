<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cooking for Monkeys</title>
<style>
  :root{
    color-scheme:light;
    --bg:#fbf6ee; --card:#fffdf9; --ink:#2e2a26; --muted:#8a7f72;
    --line:#eadfce; --accent:#d4632f; --accent-soft:#f4d9c6;
    --green:#5f7a4d; --gold:#e0a92e; --purple:#7a5aa0; --blue:#3f6d8f;
    --shadow:0 6px 22px rgba(80,55,30,.08);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5}
  button{font-family:inherit}
  header.hero{text-align:center;padding:40px 20px 22px;
    background:radial-gradient(1200px 300px at 50% -120px, var(--accent-soft), transparent 70%)}
  .hero .kicker{letter-spacing:.32em;text-transform:uppercase;font-size:12px;color:var(--accent);font-weight:700;margin-bottom:8px}
  .hero h1{font-family:Georgia,"Times New Roman",serif;font-size:42px;margin:0 0 6px;font-weight:600;letter-spacing:-.5px}
  .hero p{color:var(--muted);margin:0 auto;max-width:560px;font-size:15px}
  .toolbar{position:sticky;top:0;z-index:20;background:rgba(251,246,238,.94);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);padding:12px 20px;display:flex;flex-direction:column;gap:10px;align-items:center}
  .searchrow{display:flex;gap:10px;width:100%;max-width:860px;flex-wrap:wrap}
  #search{flex:1;min-width:180px;padding:11px 16px;border:1px solid var(--line);border-radius:30px;font-size:15px;
    background:var(--card);outline:none;transition:border .2s,box-shadow .2s}
  #search:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .btn{border:1px solid var(--line);background:var(--card);border-radius:30px;padding:0 16px;height:44px;font-size:14px;
    font-weight:600;color:var(--accent);cursor:pointer;white-space:nowrap;transition:background .2s,transform .1s}
  .btn:hover{background:var(--accent-soft)} .btn:active{transform:scale(.97)}
  .btn.solid{background:var(--accent);color:#fff;border-color:var(--accent)} .btn.solid:hover{background:#bd5527}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:30px;overflow:hidden;background:var(--card)}
  .seg button{border:0;background:transparent;padding:9px 16px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer}
  .seg button.active{background:var(--accent);color:#fff}
  .chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;max-width:940px}
  .chip{border:1px solid var(--line);background:var(--card);color:var(--muted);padding:6px 13px;border-radius:20px;
    font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;user-select:none}
  .chip:hover{border-color:var(--accent)} .chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .count{color:var(--muted);font-size:13px}
  .filters{display:flex;flex-direction:column;gap:9px;width:100%;max-width:820px;
    background:rgba(255,253,249,.7);border:1px solid var(--line);border-radius:16px;padding:12px 16px}
  .fgroup{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  .fgroup + .fgroup{border-top:1px dashed var(--line);padding-top:9px}
  .flabel{flex:0 0 68px;text-align:right;font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:700}
  .fchips{display:flex;flex-wrap:wrap;gap:7px;flex:1}
  @media(max-width:560px){.flabel{flex-basis:100%;text-align:left}}
  .fab{position:fixed;right:22px;bottom:22px;z-index:40;height:56px;border-radius:30px;border:0;
    background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer;padding:0 22px;
    display:inline-flex;align-items:center;gap:8px;box-shadow:0 8px 22px rgba(180,80,30,.38);transition:transform .12s,background .2s}
  .fab:hover{background:#bd5527;transform:translateY(-2px)} .fab:active{transform:scale(.97)}
  .fab .p{font-size:24px;line-height:1;margin-top:-2px}
  main{max-width:1150px;margin:0 auto;padding:22px 20px 100px}
  .course-head{display:flex;align-items:center;gap:14px;margin:30px 4px 14px}
  .course-head h2{font-family:Georgia,serif;font-size:26px;margin:0;font-weight:600}
  .course-head .cline{flex:1;height:1px;background:var(--line)}
  .course-head .cn{font-size:13px;color:var(--muted);font-weight:600}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:20px}
  .course-empty{color:var(--muted);font-size:14px;padding:10px 4px 4px;font-style:italic}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:var(--shadow);
    display:flex;flex-direction:column;transition:transform .18s,box-shadow .18s;cursor:pointer}
  .card.flash{animation:flash 1.4s ease}
  @keyframes flash{0%{box-shadow:0 0 0 0 var(--gold)}30%{box-shadow:0 0 0 5px var(--gold)}100%{box-shadow:var(--shadow)}}
  .card:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(80,55,30,.13)}
  .photo{position:relative;aspect-ratio:4/3;background:linear-gradient(135deg,#f6ede0,#efe2cf);
    display:flex;align-items:center;justify-content:center;overflow:hidden}
  .photo img{width:100%;height:100%;object-fit:cover;display:block}
  .photo .ph-empty{text-align:center;color:var(--muted);font-size:13px;padding:14px}
  .photo .ph-empty .plus{font-size:30px;display:block;margin-bottom:2px;color:var(--accent);font-weight:300}
  .status-pill{position:absolute;top:8px;left:8px;border-radius:14px;padding:3px 10px;font-size:11px;font-weight:700;color:#fff}
  .status-pill.made{background:var(--green)} .status-pill.try{background:var(--blue)}
  .multi-pill{position:absolute;bottom:8px;right:8px;background:rgba(46,42,38,.72);color:#fff;border-radius:14px;padding:2px 8px;font-size:11px;font-weight:600}
  .body{padding:14px 16px 16px;display:flex;flex-direction:column;gap:9px;flex:1}
  .card h3{margin:0;font-size:18px;font-family:Georgia,serif;font-weight:600;line-height:1.25}
  .tagrow{display:flex;flex-wrap:wrap;gap:6px}
  .tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:12px;text-transform:uppercase;letter-spacing:.02em}
  .tag.cuisine{background:#eef3e8;color:var(--green)} .tag.protein{background:#fbe9df;color:var(--accent)} .tag.time{background:#eaf1f6;color:var(--blue)}
  .desc{font-size:14px;color:#5c554c;flex:1}
  .starmini{display:flex;gap:1px;align-items:center;font-size:14px;color:#dcd3c4;flex-wrap:wrap}
  .starmini .on{color:var(--gold)} .starmini .lbl{font-size:12px;color:var(--muted);margin-left:6px}
  .cardfoot{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .reel{font-size:13px;font-weight:600;color:var(--accent);text-decoration:none;display:inline-flex;align-items:center;gap:5px}
  .reel:hover{text-decoration:underline} .reel.none{color:#c3b8a6;font-weight:500}
  .opencta{font-size:12px;color:var(--muted);font-weight:600}
  footer{text-align:center;color:var(--muted);font-size:13px;padding:24px 20px 50px}
  .empty-state{text-align:center;color:var(--muted);padding:50px 20px;font-size:16px}

  /* ---- Modal ---- */
  .overlay{position:fixed;inset:0;background:rgba(40,30,20,.55);backdrop-filter:blur(3px);z-index:50;
    display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:26px 16px}
  .overlay.open{display:flex}
  .modal{background:var(--card);border-radius:20px;max-width:720px;width:100%;box-shadow:0 30px 80px rgba(40,25,10,.35);overflow:hidden}
  .modal .mhead{position:relative}
  .gallery{display:flex;gap:0;aspect-ratio:16/9;background:#efe2cf;overflow-x:auto;scroll-snap-type:x mandatory}
  .gallery .slide{position:relative;min-width:100%;scroll-snap-align:start;display:flex;align-items:center;justify-content:center}
  .gallery img{width:100%;height:100%;object-fit:cover}
  .gallery .empty{color:var(--muted);text-align:center;font-size:14px}
  .gallery .empty .plus{font-size:36px;display:block;color:var(--accent)}
  .g-actions{position:absolute;bottom:10px;right:10px;display:flex;gap:6px}
  .g-actions .mini{background:rgba(255,255,255,.92);border:0;border-radius:16px;padding:6px 12px;font-size:12px;font-weight:600;color:var(--ink);cursor:pointer}
  .g-actions .mini.del{color:#b23}
  .closebtn{position:absolute;top:12px;right:12px;z-index:2;background:rgba(255,255,255,.92);border:0;border-radius:50%;
    width:38px;height:38px;font-size:20px;cursor:pointer;color:var(--ink);line-height:1}
  .mbody{padding:20px 22px 26px;display:flex;flex-direction:column;gap:16px}
  .mtitle{font-family:Georgia,serif;font-size:27px;font-weight:600;margin:0;border:0;outline:none;background:transparent;width:100%}
  .mtitle:focus{border-bottom:2px solid var(--accent-soft)}
  .metarow{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
  .field-select{border:1px solid var(--line);border-radius:20px;padding:7px 12px;font-size:13px;font-weight:600;background:var(--card);color:var(--ink);cursor:pointer}
  .statustoggle{display:inline-flex;border:1px solid var(--line);border-radius:20px;overflow:hidden}
  .statustoggle button{border:0;background:transparent;padding:7px 14px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer}
  .statustoggle button.on-made{background:var(--green);color:#fff} .statustoggle button.on-try{background:var(--blue);color:#fff}
  .stars10{display:flex;gap:2px;align-items:center;flex-wrap:wrap}
  .stars10 .s{font-size:22px;cursor:pointer;color:#dcd3c4;transition:transform .1s,color .1s;line-height:1}
  .stars10 .s:hover{transform:scale(1.2)} .stars10 .s.on{color:var(--gold)}
  .stars10 .lbl{font-size:13px;color:var(--muted);margin-left:8px;font-weight:600}
  .sec label.h{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700;margin-bottom:6px}
  .sec textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px 13px;font-size:14px;font-family:inherit;
    resize:vertical;background:#fffefb;outline:none;color:var(--ink)}
  .sec textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .hint{font-size:12px;color:var(--muted);margin-top:4px}
  .msave{font-size:12px;color:var(--green);font-weight:600;opacity:0;transition:opacity .3s}
  .msave.show{opacity:1}
  .mactions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;border-top:1px solid var(--line);padding-top:16px}

  /* ---- Cook mode ---- */
  .cook{position:fixed;inset:0;background:#fffdf9;z-index:70;display:none;flex-direction:column;padding:0}
  .cook.open{display:flex}
  .cook .chead{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line);gap:12px}
  .cook .chead h2{font-family:Georgia,serif;margin:0;font-size:22px}
  .cook .cprog{height:6px;background:var(--line)}
  .cook .cprog .bar{height:100%;background:var(--green);width:0;transition:width .3s}
  .cook .csteps{flex:1;overflow-y:auto;padding:22px 20px 60px;max-width:760px;margin:0 auto;width:100%}
  .cstep{display:flex;gap:14px;align-items:flex-start;padding:16px;border:1px solid var(--line);border-radius:14px;margin-bottom:12px;
    font-size:19px;line-height:1.5;cursor:pointer;background:var(--card);transition:opacity .2s}
  .cstep .ck{flex-shrink:0;width:30px;height:30px;border-radius:50%;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff}
  .cstep.done{opacity:.5} .cstep.done .ck{background:var(--green);border-color:var(--green)}
  .cstep .num{font-weight:700;color:var(--accent);margin-right:2px}
  .cook .cfoot{padding:12px 20px;border-top:1px solid var(--line);text-align:center;color:var(--muted);font-size:13px}
  .wakebad{color:#b23;font-size:12px}
  @media(max-width:520px){.hero h1{font-size:33px}.grid{grid-template-columns:1fr}.mtitle{font-size:23px}}
</style>
</head>
<body>
<header class="hero">
  <div class="kicker">Weeknight Experiments</div>
  <h1>Cooking for Monkeys 🐒</h1>
  <p>Everything we've cooked, tested, and want to make again. Click any dish for the full recipe.</p>
</header>

<div class="toolbar">
  <div class="searchrow">
    <input id="search" type="text" placeholder="Search dishes, ingredients, notes…" autocomplete="off">
    <div class="seg" id="statusSeg">
      <button data-s="all" class="active">All</button>
      <button data-s="made">✅ Made it</button>
      <button data-s="try">🔖 To try</button>
    </div>
    <button class="btn" onclick="surpriseMe()">🎲 Pick one</button>
  </div>
  <div class="filters" id="filters">
    <div class="fgroup"><span class="flabel">Meal</span><div class="fchips" id="fc-course"></div></div>
    <div class="fgroup"><span class="flabel">Time</span><div class="fchips" id="fc-time"></div></div>
    <div class="fgroup"><span class="flabel">Protein</span><div class="fchips" id="fc-protein"></div></div>
  </div>
  <div class="count" id="count"></div>
</div>

<main id="main"></main>
<div class="empty-state" id="empty" style="display:none">Nothing matches. Try clearing a filter.</div>

<footer>Made with love in the kitchen · <span id="total"></span> dishes and counting</footer>

<button class="fab" onclick="openDetail(null)" title="Add a dish" aria-label="Add a dish"><span class="p">＋</span> Add dish</button>

<!-- Detail modal -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal"></div>
</div>

<!-- Cook mode -->
<div class="cook" id="cook">
  <div class="chead">
    <h2 id="cookTitle">Cook mode</h2>
    <button class="btn" onclick="closeCook()">✕ Exit</button>
  </div>
  <div class="cprog"><div class="bar" id="cookBar"></div></div>
  <div class="csteps" id="cookSteps"></div>
  <div class="cfoot" id="cookFoot"></div>
</div>

<input type="file" id="filepick" accept="image/*" style="display:none">

<script>
/* ================= Base data ================= */
const TIMES=["≤ 30 min","30–60 min","Over 1 hr"];
const COURSES=["Appetizer","Main","Dessert"];
const BASE=[
  {id:"loaded-sweet-potato",title:"Loaded Sweet Potato",course:"Main",cuisine:"Tex-Mex",protein:"Beef",time:"30–60 min",
   reel:"https://www.instagram.com/reel/DY5JrS3JKap/",
   desc:"Roasted sweet potato loaded with ground beef, pico de gallo, cheese, and avocado.",
   notes:"Super easy to make, delicious."},
  {id:"steak-sandwich",title:"Steak Sandwich",course:"Main",cuisine:"Sandwich",protein:"Steak",time:"30–60 min",
   reel:"https://www.instagram.com/reel/DWq-Ui3jWjy/",
   desc:"Ciabatta with chimichurri steak, arugula, tomato, and caramelized onion.",
   notes:"Go light on the lemon zest. Want to try a softer / more tender cut of meat. Idea: sub zucchini with tomato and caramelized onion."},
  {id:"mango-fish-tacos",title:"Mango Salsa Fish Tacos",course:"Main",cuisine:"Mexican",protein:"Fish",time:"30–60 min",
   reel:"https://www.instagram.com/reel/C--18XrOFyY/",
   desc:"Charred corn tortillas with blackened fish, mango-avocado salsa, red cabbage, and green crema.",
   notes:"Skip the cod — avoid previously-frozen fish (used sea bass this time). The Cava sauces don't pair that well with the taco."},
  {id:"ground-beef-tacos",title:"Ground Beef Tacos",course:"Main",cuisine:"Mexican",protein:"Beef",time:"≤ 30 min",
   reel:"",
   desc:"Classic ground beef tacos with guac, lettuce, and corn tortillas.",
   notes:"No recipe — freestyle. Super easy. Used Trader Joe's taco seasoning on the beef. The TJ's spicy taco sauce was way too spicy."},
  {id:"one-pan-bourekas",title:"One Pan Bourekas",course:"Main",cuisine:"Israeli",protein:"Vegetarian",time:"30–60 min",
   reel:"https://www.instagram.com/reel/DSIsXekEcKD/",
   desc:"Puff pastry and cheese baked on one sheet, topped with za'atar and sesame.",
   notes:"Yummy and easy. The everything-but-the-bagel is skippable — the za'atar and sesame seeds are the best part."},
  {id:"schnitzel-israeli-salad",title:"Schnitzel + Israeli Salad",course:"Main",cuisine:"Israeli",protein:"Chicken",time:"30–60 min",
   reel:"https://www.instagram.com/reel/DaJbALhvSTS/",
   desc:"Panko chicken schnitzel with chopped Israeli salad, hummus, and pita.",
   notes:"Easier than you think. The chicken doesn't need flour — just season the panko and the eggs. Add fresh mint (yerba buena) to the salad and it's even better."},
  {id:"crispy-rice",title:"Crispy Rice Tartares",course:"Main",cuisine:"Japanese",protein:"Fish",time:"Over 1 hr",
   reel:"",
   desc:"Crispy fried rice squares with salmon and tuna tartare, mango poke, and nori.",
   notes:"Check the soy sauce isn't expired. The tuna tasted a little off this time — try again. The tartares beat the spicy versions."},
  {id:"spanish-night",title:"Spanish Night",course:"Main",cuisine:"Spanish",protein:"Vegetarian",time:"Over 1 hr",
   reel:"",
   desc:"Tortilla española, pan con tomate, and quesitos.",
   notes:"Takes kind of forever — start early!"},
  {id:"fried-chicken-bites",title:"Fried Chicken Bites",course:"Main",cuisine:"Asian",protein:"Chicken",time:"30–60 min",
   reel:"",
   desc:"Crispy panko chicken bites over rice with cucumber and scallion.",
   notes:""},

  /* ---- To-try: Mains ---- */
  {id:"pasta-primavera",title:"Pasta Primavera",course:"Main",cuisine:"Italian",protein:"Vegetarian",time:"30–60 min",status:"made",reel:"",
   desc:"Pasta tossed with sautéed spring vegetables in a light sauce.",notes:""},
  {id:"pasta-bolognese",title:"Pasta Bolognese",course:"Main",cuisine:"Italian",protein:"Beef",time:"Over 1 hr",status:"made",reel:"",
   desc:"Slow-simmered beef and tomato ragù over pasta.",notes:""},
  {id:"pasta-crema-salmone",title:"Pasta con Crema e Salmone",course:"Main",cuisine:"Italian",protein:"Fish",time:"≤ 30 min",status:"made",reel:"",
   desc:"Creamy pasta with salmon.",notes:""},
  {id:"pizza-margherita",title:"Pizza Margherita",course:"Main",cuisine:"Italian",protein:"Vegetarian",time:"30–60 min",status:"made",reel:"",
   desc:"Tomato, fresh mozzarella, and basil.",notes:""},
  {id:"pizza-caprese",title:"Pizza Caprese",course:"Main",cuisine:"Italian",protein:"Vegetarian",time:"30–60 min",status:"made",reel:"",
   desc:"Pizza topped with fresh mozzarella, tomato, and basil.",notes:""},
  {id:"thai-noodles-salmon",title:"Thai Noodles with Salmon",course:"Main",cuisine:"Thai",protein:"Fish",time:"30–60 min",status:"made",reel:"",
   desc:"Thai-style noodles with salmon.",notes:""},

  /* ---- To-try: Appetizers ---- */
  {id:"focaccia-burrata-dip",title:"Focaccia with Tomato & Burrata Dip",course:"Appetizer",cuisine:"Italian",protein:"Vegetarian",time:"30–60 min",status:"made",reel:"",
   desc:"Warm focaccia served with a tomato and burrata dip.",notes:""},
  {id:"caprese",title:"Caprese",course:"Appetizer",cuisine:"Italian",protein:"Vegetarian",time:"≤ 30 min",status:"made",reel:"",
   desc:"Fresh mozzarella, tomato, and basil with olive oil.",notes:""},

  /* ---- Dessert ---- */
  {id:"nutella-pizza",title:"Nutella Pizza",course:"Dessert",cuisine:"Italian",protein:"Vegetarian",time:"30–60 min",status:"made",reel:"",
   desc:"Sweet pizza spread with Nutella.",notes:""}
];

/* ================= Storage ================= */
const OKEY="cfm.v2.overrides", CKEY="cfm.v2.custom";
function load(k,f){try{return JSON.parse(localStorage.getItem(k))||f}catch(e){return f}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){toast("⚠️ Browser is blocking storage for this file — edits won't persist between visits.")}}
let overrides=load(OKEY,{});   // {id:{field:val}}
let custom=load(CKEY,[]);      // [{...full recipe}]

function recipeById(id){
  const base=BASE.find(r=>r.id===id);
  if(base) return Object.assign({}, {photos:[],rating:0,status:"made",ingredients:"",steps:""}, base, overrides[id]||{});
  const c=custom.find(r=>r.id===id);
  return c?Object.assign({},c):null;
}
function allRecipes(){
  const baseMerged=BASE.map(r=>recipeById(r.id));
  const customMerged=custom.map(r=>Object.assign({photos:[],rating:0,status:"try",ingredients:"",steps:""},r));
  return baseMerged.concat(customMerged);
}
function isCustom(id){return !!custom.find(r=>r.id===id)}
function setField(id,field,val){
  if(isCustom(id)){const r=custom.find(x=>x.id===id);r[field]=val;save(CKEY,custom);}
  else{overrides[id]=overrides[id]||{};overrides[id][field]=val;save(OKEY,overrides);}
}

/* ================= Folder photos =================
   Auto-load photos dropped into an /images folder next to this file.
   Convention per dish id:  images/<id>.jpg  (single)  and/or
   images/<id>-1.jpg, images/<id>-2.jpg, ...  (a gallery).
   Also accepts .jpeg .png .webp. These appear for everyone who opens
   the hosted page — no upload needed. Falls back silently when absent. */
const IMG_DIR="images/", IMG_EXTS=["jpg","jpeg","png","webp"], MAX_PER_DISH=12;
let folderPhotos={};  // id -> [url,...] in order
function loadFirst(urls,cb){ // resolves first url that loads, else null
  let i=0;(function next(){
    if(i>=urls.length){cb(null);return;}
    const u=urls[i++],im=new Image();
    im.onload=()=>cb(u);im.onerror=next;im.src=u;
  })();
}
function extsFor(base){return IMG_EXTS.map(e=>IMG_DIR+base+"."+e);}
function probeDish(id,done){
  const found=[];
  loadFirst(extsFor(id),bare=>{           // bare images/<id>.ext
    if(bare)found.push(bare);
    (function num(n){                       // then numbered chain, stop at first gap
      if(n>MAX_PER_DISH){finish();return;}
      loadFirst(extsFor(id+"-"+n),u=>{
        if(u){found.push(u);num(n+1);}else finish();
      });
    })(1);
  });
  function finish(){if(found.length)folderPhotos[id]=found;done(found);}
}
let _reRenderT=null;
function probeAllFolderPhotos(){
  const ids=BASE.map(r=>r.id).concat(custom.map(r=>r.id));
  ids.forEach(id=>probeDish(id,found=>{
    if(!found.length)return;
    clearTimeout(_reRenderT);
    _reRenderT=setTimeout(()=>{render();if(currentId)renderModal();},60);
  }));
}
/* Combined photos for display: folder photos first, then browser uploads. */
function photosFor(r){return (folderPhotos[r.id]||[]).concat(r.photos||[]);}

/* ================= State ================= */
let statusFilter="all", filterCourse="All", filterTime="All", filterProtein="All", query="";

/* ================= Filter groups (independent, combine with AND) ================= */
function buildGroup(elId, values, getter, setter){
  const el=document.getElementById(elId);
  ["All",...values].forEach(v=>{
    const c=document.createElement("div");
    c.className="chip"+(getter()===v?" active":"");c.textContent=v;
    c.onclick=()=>{setter(v);[...el.children].forEach(x=>x.classList.remove("active"));c.classList.add("active");render();};
    el.appendChild(c);
  });
}
buildGroup("fc-course",["Appetizer","Main","Dessert"],()=>filterCourse,v=>filterCourse=v);
buildGroup("fc-time",["≤ 30 min","30–60 min","Over 1 hr"],()=>filterTime,v=>filterTime=v);
buildGroup("fc-protein",["Chicken","Beef","Steak","Fish","Vegetarian"],()=>filterProtein,v=>filterProtein=v);
function resetFilterUI(){
  ["fc-course","fc-time","fc-protein"].forEach(id=>[...document.getElementById(id).children].forEach((x,i)=>x.classList.toggle("active",i===0)));
  [...document.getElementById("statusSeg").children].forEach((x,i)=>x.classList.toggle("active",i===0));
}
document.getElementById("statusSeg").addEventListener("click",e=>{
  const b=e.target.closest("button");if(!b)return;
  statusFilter=b.dataset.s;[...e.currentTarget.children].forEach(x=>x.classList.remove("active"));b.classList.add("active");render();
});
document.getElementById("search").addEventListener("input",e=>{query=e.target.value.trim().toLowerCase();render();});

/* ================= Render ================= */
const mainEl=document.getElementById("main"), emptyEl=document.getElementById("empty");
function matches(r){
  if(statusFilter!=="all" && r.status!==statusFilter) return false;
  if(filterCourse!=="All" && r.course!==filterCourse) return false;
  if(filterTime!=="All" && r.time!==filterTime) return false;
  if(filterProtein!=="All" && r.protein!==filterProtein) return false;
  if(query){
    const hay=(r.title+" "+r.cuisine+" "+r.protein+" "+r.course+" "+r.desc+" "+r.notes+" "+r.ingredients+" "+r.steps).toLowerCase();
    if(!hay.includes(query)) return false;
  }
  return true;
}
function render(){
  const list=allRecipes().filter(matches);
  document.getElementById("total").textContent=allRecipes().length;
  document.getElementById("count").textContent=list.length+" of "+allRecipes().length+" dishes shown";
  mainEl.innerHTML="";
  emptyEl.style.display=list.length?"none":"block";
  const anyFilter=query||statusFilter!=="all"||filterCourse!=="All"||filterTime!=="All"||filterProtein!=="All";
  COURSES.forEach(course=>{
    if(filterCourse!=="All" && filterCourse!==course) return;
    const inCourse=list.filter(r=>r.course===course);
    // Hide empty course sections whenever a filter/search is narrowing results
    if(!inCourse.length && anyFilter) return;
    const head=document.createElement("div");head.className="course-head";
    head.innerHTML=`<h2>${courseLabel(course)}</h2><div class="cline"></div><div class="cn">${inCourse.length}</div>`;
    mainEl.appendChild(head);
    if(inCourse.length){
      const grid=document.createElement("div");grid.className="grid";
      inCourse.forEach(r=>grid.appendChild(card(r)));
      mainEl.appendChild(grid);
    }else{
      const e=document.createElement("div");e.className="course-empty";
      e.textContent="Nothing here yet — add one with ＋ Add dish.";
      mainEl.appendChild(e);
    }
  });
}
function courseLabel(c){return c==="Appetizer"?"Appetizers":c==="Main"?"Mains":"Desserts";}

function card(r){
  const el=document.createElement("div");el.className="card";el.id="card-"+r.id;
  const pics=photosFor(r);const cover=pics[0]||null;
  const photo=document.createElement("div");photo.className="photo";
  photo.innerHTML=(cover?`<img src="${cover}" alt="" loading="lazy">`:`<div class="ph-empty"><span class="plus">+</span>Add a photo</div>`)
    +`<div class="status-pill ${r.status==='made'?'made':'try'}">${r.status==='made'?'Made it':'To try'}</div>`
    +(pics.length>1?`<div class="multi-pill">+${pics.length-1}</div>`:"");
  el.appendChild(photo);
  const body=document.createElement("div");body.className="body";
  const rate=r.rating?`<span class="starmini">${starRow(r.rating)}<span class="lbl">${r.rating}/10</span></span>`:`<span class="starmini"><span class="lbl">Not rated</span></span>`;
  body.innerHTML=
    `<h3>${esc(r.title)}</h3>`+
    `<div class="tagrow"><span class="tag time">${r.time}</span><span class="tag protein">${esc(r.protein)}</span><span class="tag cuisine">${esc(r.cuisine)}</span></div>`+
    `<div class="desc">${esc(r.desc)||"<i>No description yet.</i>"}</div>`+
    rate+
    `<div class="cardfoot">${r.reel?`<a class="reel" href="${r.reel}" target="_blank" rel="noopener" onclick="event.stopPropagation()">▶ Reel</a>`:`<span class="reel none">Freestyle</span>`}<span class="opencta">Open recipe →</span></div>`;
  el.appendChild(body);
  el.onclick=()=>openDetail(r.id);
  return el;
}
function starRow(n){let s="";for(let i=1;i<=10;i++)s+=`<span class="${i<=n?'on':''}">★</span>`;return s;}
function esc(t){return (t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

/* ================= Detail modal ================= */
let currentId=null, pickMode=null; // pickMode: 'card' | 'modal'
const overlay=document.getElementById("overlay"), modal=document.getElementById("modal");

function openDetail(id){
  if(id===null){ // create new
    const nid="dish-"+Date.now();
    custom.push({id:nid,title:"New dish",course:"Main",cuisine:"—",protein:"—",time:"30–60 min",reel:"",desc:"",notes:"",photos:[],rating:0,status:"try",ingredients:"",steps:""});
    save(CKEY,custom); id=nid;
  }
  currentId=id;
  renderModal();
  overlay.classList.add("open");
  document.body.style.overflow="hidden";
}
function closeDetail(){overlay.classList.remove("open");document.body.style.overflow="";currentId=null;render();}
overlay.addEventListener("click",e=>{if(e.target===overlay)closeDetail();});

function renderModal(){
  const r=recipeById(currentId);
  if(!r){closeDetail();return;}
  const folder=(folderPhotos[currentId]||[]);
  const uploads=(r.photos||[]);
  const slides=folder.map(p=>({url:p,folder:true}))
    .concat(uploads.map((p,i)=>({url:p,folder:false,idx:i})));
  const gallery=slides.length
    ? slides.map(s=>`<div class="slide"><img src="${s.url}" alt=""><div class="g-actions"><button class="mini" onclick="addPhoto()">＋ Add</button>${s.folder?`<span class="mini" style="background:rgba(95,122,77,.9);color:#fff">📁 folder</span>`:`<button class="mini del" onclick="delPhoto(${s.idx})">Delete</button>`}</div></div>`).join("")
    : `<div class="slide"><div class="empty"><span class="plus">＋</span>Click to add a photo</div><div class="g-actions"><button class="mini" onclick="addPhoto()">＋ Add photo</button></div></div>`;
  const canDelete=isCustom(currentId);
  modal.innerHTML=`
    <button class="closebtn" onclick="closeDetail()">✕</button>
    <div class="mhead"><div class="gallery" ${slides.length?'':'onclick="addPhoto()"'}>${gallery}</div></div>
    <div class="mbody">
      <input class="mtitle" id="f_title" value="${esc(r.title).replace(/"/g,'&quot;')}" onchange="fld('title',this.value)">
      <div class="metarow">
        <select class="field-select" id="f_course" onchange="fld('course',this.value)">${COURSES.map(c=>`<option ${r.course===c?'selected':''}>${c}</option>`).join("")}</select>
        <select class="field-select" id="f_time" onchange="fld('time',this.value)">${TIMES.map(t=>`<option ${r.time===t?'selected':''}>${t}</option>`).join("")}</select>
        <div class="statustoggle">
          <button class="${r.status==='made'?'on-made':''}" onclick="fld('status','made')">✅ Made it</button>
          <button class="${r.status==='try'?'on-try':''}" onclick="fld('status','try')">🔖 To try</button>
        </div>
      </div>
      <div class="metarow">
        <input class="field-select" style="min-width:60px" id="f_cuisine" value="${esc(r.cuisine).replace(/"/g,'&quot;')}" onchange="fld('cuisine',this.value)" placeholder="Cuisine">
        <input class="field-select" style="min-width:60px" id="f_protein" value="${esc(r.protein).replace(/"/g,'&quot;')}" onchange="fld('protein',this.value)" placeholder="Main protein">
        <input class="field-select" style="flex:1;min-width:160px" id="f_reel" value="${esc(r.reel).replace(/"/g,'&quot;')}" onchange="fld('reel',this.value)" placeholder="Recipe / reel link (optional)">
      </div>
      <div class="stars10" id="stars10">${[...Array(10)].map((_,i)=>`<span class="s ${i<r.rating?'on':''}" onclick="setRating(${i+1})">★</span>`).join("")}<span class="lbl">${r.rating?r.rating+'/10':'Rate 1–10'}</span></div>
      <div class="sec"><label class="h">What it is</label><textarea id="f_desc" rows="2" onblur="fld('desc',this.value)" placeholder="Short description of the dish…">${esc(r.desc)}</textarea></div>
      <div class="sec"><label class="h">Notes</label><textarea id="f_notes" rows="3" onblur="fld('notes',this.value)" placeholder="Tweaks, what worked, what to change next time…">${esc(r.notes)}</textarea></div>
      <div class="sec"><label class="h">Ingredients</label><textarea id="f_ing" rows="5" onblur="fld('ingredients',this.value)" placeholder="One per line…">${esc(r.ingredients)}</textarea><div class="hint">One ingredient per line.</div></div>
      <div class="sec"><label class="h">Steps</label><textarea id="f_steps" rows="6" onblur="fld('steps',this.value)" placeholder="One step per line…">${esc(r.steps)}</textarea><div class="hint">One step per line — these power Cook mode.</div></div>
      <div class="mactions">
        <button class="btn solid" onclick="startCook()">👨‍🍳 Cook mode</button>
        ${r.reel?`<a class="btn" href="${r.reel}" target="_blank" rel="noopener" style="text-decoration:none;display:inline-flex;align-items:center">▶ Watch reel</a>`:""}
        <span class="msave" id="msave">Saved ✓</span>
        <span style="flex:1"></span>
        ${canDelete?`<button class="btn" style="color:#b23" onclick="deleteDish()">Delete dish</button>`:""}
      </div>
    </div>`;
}
function fld(f,v){setField(currentId,f,v);flashSaved();
  if(f==="status"||f==="course"){renderModal();}}
function setRating(n){const r=recipeById(currentId);const nv=(r.rating===n)?0:n;setField(currentId,"rating",nv);flashSaved();renderModal();}
function flashSaved(){const m=document.getElementById("msave");if(m){m.classList.add("show");setTimeout(()=>m.classList.remove("show"),1200);}}
function deleteDish(){if(!confirm("Delete this dish?"))return;custom=custom.filter(r=>r.id!==currentId);save(CKEY,custom);closeDetail();}

/* photos */
function addPhoto(){pickMode="modal";document.getElementById("filepick").click();}
function delPhoto(i){const r=recipeById(currentId);const ph=(r.photos||[]).slice();ph.splice(i,1);setField(currentId,"photos",ph);renderModal();}
document.getElementById("filepick").addEventListener("change",function(e){
  const file=e.target.files[0];if(!file){return;}
  const reader=new FileReader();
  reader.onload=ev=>{const img=new Image();img.onload=()=>{
    const max=1100;let w=img.width,h=img.height;
    if(w>max||h>max){const k=max/Math.max(w,h);w=Math.round(w*k);h=Math.round(h*k);}
    const cv=document.createElement("canvas");cv.width=w;cv.height=h;cv.getContext("2d").drawImage(img,0,0,w,h);
    const data=cv.toDataURL("image/jpeg",0.82);
    const r=recipeById(currentId);const ph=(r.photos||[]).slice();ph.push(data);
    setField(currentId,"photos",ph);renderModal();
  };img.src=ev.target.result;};
  reader.readAsDataURL(file);e.target.value="";
});

/* ================= Cook mode ================= */
const cookEl=document.getElementById("cook");let wakeLock=null;
async function reqWake(){try{if('wakeLock' in navigator){wakeLock=await navigator.wakeLock.request('screen');}}catch(e){wakeLock=null;}}
function relWake(){try{if(wakeLock){wakeLock.release();wakeLock=null;}}catch(e){}}
document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="visible"&&cookEl.classList.contains("open"))reqWake();});

let cookDone=[];
function startCook(){
  const r=recipeById(currentId);
  const steps=(r.steps||"").split("\n").map(s=>s.trim()).filter(Boolean);
  document.getElementById("cookTitle").textContent=r.title;
  const wrap=document.getElementById("cookSteps");
  if(!steps.length){
    wrap.innerHTML=`<div style="text-align:center;color:var(--muted);padding:40px 10px;font-size:16px">No steps yet.<br>Add steps in the recipe (one per line) and they'll show up here.</div>`;
    document.getElementById("cookFoot").innerHTML="";
    document.getElementById("cookBar").style.width="0";
  }else{
    cookDone=steps.map(()=>false);
    wrap.innerHTML=steps.map((s,i)=>`<div class="cstep" id="cs-${i}" onclick="toggleStep(${i})"><div class="ck">✓</div><div><span class="num">${i+1}.</span> ${esc(s)}</div></div>`).join("");
    updateCookProg();
    reqWake();
    document.getElementById("cookFoot").innerHTML= wakeSupported()?"Screen will stay awake while you cook.":'<span class="wakebad">Heads up: your browser may still dim the screen.</span>';
  }
  cookEl.classList.add("open");document.body.style.overflow="hidden";
}
function wakeSupported(){return 'wakeLock' in navigator;}
function toggleStep(i){cookDone[i]=!cookDone[i];document.getElementById("cs-"+i).classList.toggle("done",cookDone[i]);updateCookProg();}
function updateCookProg(){const done=cookDone.filter(Boolean).length;const pct=cookDone.length?Math.round(done/cookDone.length*100):0;document.getElementById("cookBar").style.width=pct+"%";}
function closeCook(){cookEl.classList.remove("open");relWake();document.body.style.overflow=currentId?"hidden":"";}

/* ================= Misc ================= */
function surpriseMe(){
  const pool=allRecipes();if(!pool.length)return;
  const pick=pool[Math.floor(Math.random()*pool.length)];
  statusFilter="all";filterCourse="All";filterTime="All";filterProtein="All";query="";
  document.getElementById("search").value="";
  resetFilterUI();
  render();
  const node=document.getElementById("card-"+pick.id);
  if(node){node.scrollIntoView({behavior:"smooth",block:"center"});node.classList.remove("flash");void node.offsetWidth;node.classList.add("flash");}
}
function toast(msg){/* lightweight */ console.warn(msg);}
document.addEventListener("keydown",e=>{if(e.key==="Escape"){if(cookEl.classList.contains("open"))closeCook();else if(overlay.classList.contains("open"))closeDetail();}});

render();
probeAllFolderPhotos();
</script>
</body>
